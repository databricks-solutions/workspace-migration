name: CI
on: [push, pull_request]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --frozen --extra dev
      - name: Lint
        run: uv run ruff check src/ tests/
      - name: Format check
        run: uv run ruff format --check src/ tests/
      - name: Type check
        # NOTE (review finding #11): mypy is still scoped to src/common/. A
        # full `mypy src/` currently surfaces ~108 pre-existing errors across
        # the worker modules; widening the gate requires fixing those first
        # (tracked follow-up) rather than shipping a red gate.
        run: uv run mypy src/common/
      - name: Unit tests
        # Coverage now gates ALL of src/ (was src/common/ only ~19% of code,
        # review finding #11). Floor set just below the current ~70% to gate
        # the whole package without flaking on rounding.
        run: uv run pytest tests/unit/ --cov=src --cov-report=term --cov-fail-under=68
      - name: Install Databricks CLI
        uses: databricks/setup-cli@main
      - name: Bundle validate
        env:
          BUNDLE_VAR_migration_spn_id: dummy-for-validate
        run: databricks bundle validate

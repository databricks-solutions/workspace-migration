name: Integration Tests
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  connect-tests:
    runs-on: ubuntu-latest
    env:
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --frozen --extra dev
      - name: Connect tests
        run: uv run pytest tests/connect/ -v --tb=short

  integration-tests:
    needs: connect-tests
    runs-on: ubuntu-latest
    env:
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      BUNDLE_VAR_migration_spn_id: ${{ secrets.MIGRATION_SPN_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --frozen --extra dev
      - name: Install Databricks CLI
        uses: databricks/setup-cli@main
      - name: Deploy test bundle
        run: databricks bundle deploy -t test
      - name: Run UC integration test
        run: databricks bundle run uc_integration_test -t test
      - name: Run Hive integration test
        run: databricks bundle run hive_integration_test -t test
      - name: Cleanup
        if: always()
        run: databricks bundle destroy -t test --auto-approve

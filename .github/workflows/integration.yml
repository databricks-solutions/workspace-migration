name: Integration Tests
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  connect-tests:
    runs-on: ubuntu-latest
    env:
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --frozen --extra dev
      - name: Connect tests
        run: uv run pytest tests/connect/ -v --tb=short

  integration-tests:
    needs: connect-tests
    runs-on: ubuntu-latest
    env:
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      BUNDLE_VAR_migration_spn_id: ${{ secrets.MIGRATION_SPN_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --frozen --extra dev
      - name: Install Databricks CLI
        uses: databricks/setup-cli@main
      - name: Deploy test bundle
        run: databricks bundle deploy -t test
      - name: Run UC integration test
        run: databricks bundle run uc_integration_test -t test
      - name: Run Hive integration test
        run: databricks bundle run hive_integration_test -t test
      # Previously-unwired suites (review finding #11) — these job definitions
      # existed in resources/integration_tests/ but CI never ran them.
      - name: Run governance integration test
        run: databricks bundle run governance_integration_test -t test
      - name: Run negative-paths integration test
        run: databricks bundle run negative_paths_integration_test -t test
      - name: Run online-tables integration test
        run: databricks bundle run online_tables_integration_test -t test
      - name: Run vector-search integration test
        run: databricks bundle run vector_search_integration_test -t test
      # TODO(#11 follow-up): wire test_retry_resumability + test_collision_handling.
      # Both are notebook tests with no DAB workflow yet — they need a
      # seed -> migrate(test_kill_after) -> resume -> assert chain authored in
      # resources/integration_tests/ (tracked with the integration-test
      # expansion). Until then the crash-recovery + collision suites don't run.
      - name: Cleanup
        if: always()
        run: databricks bundle destroy -t test --auto-approve

# ------------------------------------------------------------
# Migration configuration — PLACEHOLDERS ONLY.
#
# THIS FILE is the source of truth. Edit the values BELOW in your
# local clone, then ``databricks bundle deploy`` syncs your edits to
# ``${workspace.file_path}/config.yaml`` in the workspace.
#
# DO NOT edit the workspace copy directly — ``bundle deploy`` is a
# one-way sync that mirrors this local file, so any workspace-side
# edit will be overwritten on the next deploy.
#
# For integration testing:
#   1. Edit this file with real source/target URLs, SPN values, and
#      ``hive_dbfs_target_path``.
#   2. ``databricks bundle deploy -t dev``
#   3. Trigger ``uc_integration_test`` / ``hive_integration_test``.
#      The workflows back up + restore the workspace config.yaml
#      around their per-test overrides; your local file is untouched.
#
# See config.example.yaml for a fully-commented reference.
#
# Secret values (the SPN client secret itself) stay in the
# Databricks Secret Scope named by ``spn_secret_scope`` below.
# This file only references the scope/key; it never stores the
# secret value directly.
# ------------------------------------------------------------

# --- Workspaces (required) ---
source_workspace_url: https://adb-SOURCE.azuredatabricks.net
target_workspace_url: https://adb-TARGET.azuredatabricks.net

# --- SPN auth (required) ---
spn_client_id: REPLACE_WITH_APPLICATION_ID
spn_secret_scope: migration
spn_secret_key: spn-secret

# --- Scope: which source metastore domains to discover/migrate ---
# Default: UC only. Set include_hive=true to also cover the legacy
# hive_metastore catalog (discovery + migrate workflows will run Hive
# steps). The Hive integration test requires include_hive=true — flip
# it on the workspace copy before triggering that test.
scope:
  include_uc: true
  include_hive: false

# --- Scoping ---
# Comma-separated; leave empty to include everything.
catalog_filter: ""
schema_filter: ""

# --- Behaviour ---
dry_run: false
batch_size: 50
tracking_catalog: migration_tracking
tracking_schema: cp_migration

# --- Hive options (Phase 2) ---
# Set migrate_hive_dbfs_root=true to include Hive managed tables stored
# in DBFS root; required in that case: hive_dbfs_target_path (ADLS path
# the migration SPN can write to, with READ_FILES + WRITE_FILES +
# CREATE_EXTERNAL_TABLE granted on the corresponding external location).
migrate_hive_dbfs_root: false
hive_dbfs_target_path: ""
hive_target_catalog: hive_upgraded

# --- Iceberg managed tables (Phase 2.5.B) ---
# DEEP CLONE does not support UC-managed Iceberg; 'ddl_replay' uses
# CREATE TABLE + INSERT INTO via cp_migration_share (Option A). Losses:
# snapshot history, time travel, branches/tags (target gets a compacted
# current-state snapshot). Leave empty to skip Iceberg tables — they
# will be recorded with status ``skipped_by_config`` and a re-run after
# flipping this on will pick them up.
iceberg_strategy: ""

# --- Row filter / column mask on managed tables ---
# Delta Sharing refuses to share tables protected by legacy RLS/CM
# (``ALTER TABLE ... SET ROW FILTER`` / ``SET MASK``). Supported values:
#   ""              — default; affected tables skipped with status
#                     ``skipped_by_rls_cm_policy``. No data on target.
#   "staging_copy"  — CTAS each affected table into the migration
#                     tracking catalog's ``cp_migration_staging`` schema,
#                     share that staging copy, DEEP CLONE it on target,
#                     then re-apply the original RLS/CM on the target.
#                     Source RLS/CM is never altered. Migration SPN
#                     must be a workspace admin so the source-side
#                     filter's admin-bypass returns true at CTAS time.
# Discovery surfaces a warning listing the affected tables so you can
# decide whether to migrate their governance to ABAC before migration.
rls_cm_strategy: ""

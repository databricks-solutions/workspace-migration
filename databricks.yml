bundle:
  name: workspace-migration

variables:
  job_prefix:
    default: "uc-migration"
  migration_spn_id:
    description: |
      SPN application ID (Azure AD App ID / AWS Databricks OAuth client_id)
      that jobs run as. No default — operators must provide this per env
      via ``--var migration_spn_id=<app-id>`` or environment variable
      ``BUNDLE_VAR_migration_spn_id``. The SPN needs: workspace admin on
      source + target, metastore-level CREATE_* privileges, USE_PROVIDER
      on target, and READ/WRITE_FILES on any external location used for
      Hive DBFS-root migration.
  dashboard_warehouse_name:
    description: |
      Name of the SQL warehouse the migration dashboard reads from.
      Resolved to an ID via ``dashboard_warehouse_id`` lookup below. If
      you have a warehouse with a different name, override this var.
    default: "cp-migration"
  dashboard_warehouse_id:
    description: "Resolved warehouse ID (do not set directly — override dashboard_warehouse_name instead)."
    lookup:
      warehouse: ${var.dashboard_warehouse_name}
  migration_admin_group:
    description: |
      Workspace group granted CAN_MANAGE on the migration jobs. Defaults to
      the built-in ``admins`` group — always exists and is zero-escalation
      (workspace admins already manage all jobs). For least privilege,
      override with a dedicated group, e.g.
      ``--var migration_admin_group=migration_admins`` (create that group and
      add only the operators who should run these cross-workspace,
      DROP/DEEP-CLONE-capable jobs).
    default: "admins"

workspace:
  # Deploy to a Shared workspace path so the bundle is visible to all migration
  # admins, not scoped to the deployer. config.yaml ships inside the bundle
  # and is re-synced to ${workspace.file_path}/config.yaml on every
  # ``databricks bundle deploy``. Edit the file locally and redeploy.
  root_path: /Shared/cp_migration/${bundle.target}

# Bundle-level run_as conflicts with dashboards (which must run as owner).
# Each job sets run_as: ${var.migration_spn_id} individually in its resource
# file instead — dashboards are left with default (deployer) ownership.

# Least-privilege default (review finding #13): grant CAN_MANAGE to the
# migration admin group (``admins`` by default), NOT the built-in ``users``
# group (= every workspace user). These jobs run as a cross-workspace-admin
# SPN that can DROP / DEEP CLONE across both workspaces, so management must
# not be open to all users. Override migration_admin_group for a dedicated
# group.
permissions:
  - level: CAN_MANAGE
    group_name: ${var.migration_admin_group}

include:
  - resources/*.yml
  - resources/production/*.yml
  - resources/integration_tests/*.yml

targets:
  dev:
    default: true
    presets:
      # Development presets (dev-mode tags + random job names) without the
      # `mode: development` per-user path enforcement, so the bundle can deploy
      # to the Shared root_path declared above.
      name_prefix: "[dev-${workspace.current_user.short_name}] "
      tags:
        dev: "${workspace.current_user.userName}"
    resources:
      # Dashboards don't support run_as != owner, so skip in dev (SPN run_as).
      dashboards:
        migration_dashboard: null

  test:
    presets:
      name_prefix: "[test] "

  prod:
    mode: production

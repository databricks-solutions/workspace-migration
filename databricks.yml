bundle:
  name: workspace-migration

variables:
  job_prefix:
    default: "uc-migration"
  hive_test_dbfs_staging_path:
    description: |
      Shared abfss:// staging path the hive integration test uses for the
      DBFS-root two-hop copy (like-for-like: staged there, then re-created
      MANAGED in the target's own DBFS root). Default empty (the DBFS-root
      migration leg is then config-gated off). Set to a container readable +
      writable by BOTH source and target to exercise it, e.g.
      ``--var hive_test_dbfs_staging_path=abfss://<c>@<a>.dfs.core.windows.net/<p>``.
    default: ""
  migration_spn_id:
    description: |
      SPN application ID (Azure AD App ID / AWS Databricks OAuth client_id)
      that jobs run as. No default — operators must provide this per env
      via ``--var migration_spn_id=<app-id>`` or environment variable
      ``BUNDLE_VAR_migration_spn_id``. The SPN needs: workspace admin on
      source + target, metastore-level CREATE_* privileges, USE_PROVIDER
      on target, and READ/WRITE_FILES on any external location used for
      Hive DBFS-root migration.
  dashboard_warehouse_name:
    description: |
      Name of the SQL warehouse the migration dashboard reads from.
      Resolved to an ID via ``dashboard_warehouse_id`` lookup below. If
      you have a warehouse with a different name, override this var.
    default: "cp-migration"
  dashboard_warehouse_id:
    description: "Resolved warehouse ID (do not set directly — override dashboard_warehouse_name instead)."
    lookup:
      warehouse: ${var.dashboard_warehouse_name}
  hive_adls_spark_conf:
    description: |
      Full spark_conf map for the classic No-Isolation cluster that discovers +
      migrates hive_metastore tables stored on ADLS (seed_hive, discover_hive,
      and the hive external/managed-nondbfs workers). Why a complex (whole-map)
      variable: the per-account ``fs.azure.account.key.<ACCOUNT>.dfs.core.windows.net``
      entry has the storage account name IN THE KEY, and DAB can't template a
      spark_conf key with ${var...} — so the whole map (including that key) is
      supplied per-environment via a target ``variables:`` override below. The
      key's VALUE is a Databricks secret reference, so the real storage key is
      never committed (put it in the scope with ``databricks secrets put-secret``).
      The default has only the single-node profile (required: num_workers:0 with
      no singleNode profile = a driver with zero executors = jobs hang) and NO
      account key — environments WITHOUT ADLS-backed hive_metastore tables can
      use it as-is; environments WITH them must override per target.
    type: complex
    default:
      spark.databricks.cluster.profile: "singleNode"
      spark.master: "local[*]"

workspace:
  # Deploy to a Shared workspace path so the bundle is visible to all migration
  # admins, not scoped to the deployer. config.yaml ships inside the bundle
  # and is re-synced to ${workspace.file_path}/config.yaml on every
  # ``databricks bundle deploy``. Edit the file locally and redeploy.
  root_path: /Shared/cp_migration/${bundle.target}

# Bundle-level run_as conflicts with dashboards (which must run as owner).
# Each job sets run_as: ${var.migration_spn_id} individually in its resource
# file instead — dashboards are left with default (deployer) ownership.

# Least-privilege job management (review finding #13). The old default granted
# CAN_MANAGE to the built-in ``users`` group (= every workspace user), which is
# a privilege-escalation risk because these jobs run as a cross-workspace-admin
# SPN that can DROP / DEEP CLONE across both workspaces. We deliberately ship NO
# bundle-level permissions block: jobs are owned by the deployer and remain
# manageable by workspace admins implicitly (Databricks rejects an explicit
# CAN_MANAGE grant to the ``admins`` group anyway). Operators who want a
# dedicated migration-admin group can add their own ``permissions:`` block here
# with ``group_name: <their-group>`` — NEVER ``users``.

include:
  - resources/*.yml
  - resources/production/*.yml
  - resources/integration_tests/*.yml

# config.yaml is gitignored (holds real workspace URLs + SPN client id), but it
# IS the runtime config the notebooks read from ${workspace.file_path}/config.yaml.
# DAB's default sync skips gitignored files, so force-include it here — otherwise
# setup_test_config / the workers fail with "config.yaml not found".
sync:
  include:
    - config.yaml

targets:
  dev:
    default: true
    presets:
      # Development presets (dev-mode tags + random job names) without the
      # `mode: development` per-user path enforcement, so the bundle can deploy
      # to the Shared root_path declared above.
      name_prefix: "[dev-${workspace.current_user.short_name}] "
      tags:
        dev: "${workspace.current_user.userName}"
    variables:
      # Dev lab's ADLS account + key (key value = secret reference, resolved at
      # cluster launch). Replace the account name + secret scope/key per env.
      hive_adls_spark_conf:
        spark.databricks.cluster.profile: "singleNode"
        spark.master: "local[*]"
        spark.hadoop.fs.azure.account.key.stextsourcemig36cd38.dfs.core.windows.net: "{{secrets/migration/adls-account-key}}"
    resources:
      # Dashboards don't support run_as != owner, so skip in dev (SPN run_as).
      dashboards:
        migration_dashboard: null

  test:
    presets:
      name_prefix: "[test] "
    variables:
      hive_adls_spark_conf:
        spark.databricks.cluster.profile: "singleNode"
        spark.master: "local[*]"
        spark.hadoop.fs.azure.account.key.stextsourcemig36cd38.dfs.core.windows.net: "{{secrets/migration/adls-account-key}}"

  prod:
    mode: production
    # Set the prod ADLS account + secret here (only needed if you migrate
    # hive_metastore tables stored on ADLS):
    # variables:
    #   hive_adls_spark_conf:
    #     spark.databricks.cluster.profile: "singleNode"
    #     spark.master: "local[*]"
    #     spark.hadoop.fs.azure.account.key.<PROD_ACCOUNT>.dfs.core.windows.net: "{{secrets/<prod-scope>/<prod-key>}}"

resources:
  jobs:
    migrate_hive:
      name: "${var.job_prefix}-migrate-hive"
      description: |
        Hive (legacy) data plane: external + managed-nondbfs + managed-dbfs
        tables, Hive functions/views, plus Hive ACLs replayed as UC grants
        on the target catalog. Depends operationally on the discovery job;
        run discovery first.
      run_as:
        service_principal_name: ${var.migration_spn_id}
      # Classic single-node cluster for the hive_metastore EXTERNAL /
      # managed-non-DBFS workers ONLY. Those tables live on ADLS, and
      # hive_metastore LOCATION access does NOT route through UC credential
      # vending — it falls back to the legacy fs.azure.account.key path, which
      # serverless blocks. The workers call hive_common.configure_adls_account_key()
      # at runtime to set fs.azure.account.key.<account> from the secret
      # migration/adls-account-key (account parsed from each table's
      # storage_location) — that conf is only settable on classic compute, hence
      # this cluster. All other hive tasks stay serverless (dbfs-root reads
      # workspace storage; functions/views/grants are metadata-only).
      job_clusters:
        - job_cluster_key: hive_adls_classic
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            # No-Isolation single-node cluster (data_security_mode: NONE). This
            # is the ONLY mode that honors the legacy fs.azure.account.key conf
            # for hive_metastore-on-ADLS reads — UC access modes (SINGLE_USER /
            # standard) ignore Hadoop filesystem settings (confirmed in docs +
            # a live hang). Because NONE compute can't touch Unity Catalog, the
            # external/nondbfs workers route ALL their UC operations (status
            # writes + target row-count) through the SQL warehouse; only the
            # legacy source reads run on this cluster's spark session.
            num_workers: 0
            data_security_mode: "NONE"
            # spark_conf (singleNode profile + the ADLS account key) is supplied
            # per-environment via the hive_adls_spark_conf complex var — the
            # account name is in the conf KEY, which DAB can't template, so the
            # whole map comes from the var (key value = secret reference).
            spark_conf: ${var.hive_adls_spark_conf}
            custom_tags:
              ResourceClass: "SingleNode"
            azure_attributes:
              availability: "ON_DEMAND_AZURE"
      tasks:
        - task_key: hive_orchestrator
          notebook_task:
            notebook_path: ../../src/migrate/hive_orchestrator.py

        - task_key: migrate_hive_external_tables
          depends_on:
            - task_key: hive_orchestrator
          for_each_task:
            inputs: "{{tasks.hive_orchestrator.values.hive_external_batches}}"
            task:
              task_key: hive_external_batch
              job_cluster_key: hive_adls_classic
              notebook_task:
                notebook_path: ../../src/migrate/hive_external_worker.py
                base_parameters:
                  batch: "{{input}}"

        - task_key: migrate_hive_managed_nondbfs
          depends_on:
            - task_key: hive_orchestrator
          for_each_task:
            inputs: "{{tasks.hive_orchestrator.values.hive_managed_nondbfs_batches}}"
            task:
              task_key: hive_managed_nondbfs_batch
              job_cluster_key: hive_adls_classic
              notebook_task:
                notebook_path: ../../src/migrate/hive_managed_nondbfs_worker.py
                base_parameters:
                  batch: "{{input}}"

        - task_key: migrate_hive_managed_dbfs
          depends_on:
            - task_key: hive_orchestrator
          for_each_task:
            inputs: "{{tasks.hive_orchestrator.values.hive_managed_dbfs_root_batches}}"
            task:
              task_key: hive_managed_dbfs_batch
              notebook_task:
                notebook_path: ../../src/migrate/hive_managed_dbfs_worker.py
                base_parameters:
                  batch: "{{input}}"

        - task_key: migrate_hive_functions
          depends_on:
            - task_key: migrate_hive_external_tables
            - task_key: migrate_hive_managed_nondbfs
            - task_key: migrate_hive_managed_dbfs
          notebook_task:
            notebook_path: ../../src/migrate/hive_functions_worker.py

        - task_key: migrate_hive_views
          depends_on:
            - task_key: migrate_hive_external_tables
            - task_key: migrate_hive_managed_nondbfs
            - task_key: migrate_hive_managed_dbfs
            - task_key: migrate_hive_functions
          notebook_task:
            notebook_path: ../../src/migrate/hive_views_worker.py

        - task_key: migrate_hive_grants
          depends_on:
            - task_key: migrate_hive_views
          notebook_task:
            notebook_path: ../../src/migrate/hive_grants_worker.py

        - task_key: summary_hive
          run_if: ALL_DONE
          depends_on:
            - task_key: migrate_hive_grants
          notebook_task:
            notebook_path: ../../src/migrate/summary.py
            base_parameters:
              # WS-2: Per-workflow filter — only Hive object types.
              # Values match what Hive workers actually emit into
              # migration_status.
              object_types: "hive_external,hive_managed_nondbfs,hive_managed_dbfs_root,hive_function,hive_view,hive_grant"

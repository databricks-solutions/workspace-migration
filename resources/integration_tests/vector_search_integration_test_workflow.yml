resources:
  jobs:
    vector_search_integration_test:
      name: "${var.job_prefix}-vector-search-integration-test"
      description: |
        Vector Search integration test: runs discovery, invokes the
        migrate_vector_search job, then asserts migration_status rows are
        in a known terminal VS state. Zero vector_search_index rows is a
        pass (VS preview may be disabled in the test workspace).
      run_as:
        service_principal_name: ${var.migration_spn_id}
      tasks:
        - task_key: setup_test_config
          notebook_task:
            notebook_path: ../../tests/integration/setup_test_config.py
            # VS integration test: no Iceberg DDL replay, no RLS/CM staging,
            # no Hive DBFS-root migration. catalog_filter scopes discovery to
            # the VS fixture catalog so the UC/Hive fixtures seeded in
            # parallel runs are ignored.
            base_parameters:
              iceberg_strategy: ""
              rls_cm_strategy: ""
              migrate_hive_dbfs_root: "false"
              hive_dbfs_staging_path: ""
              catalog_filter: "integration_test_src"

        - task_key: seed_vector_search
          depends_on:
            - task_key: setup_test_config
          notebook_task:
            notebook_path: ../../tests/integration/seed_vector_search_test_data.py

        - task_key: discovery
          depends_on:
            - task_key: seed_vector_search
          notebook_task:
            notebook_path: ../../src/discovery/discovery.py

        - task_key: migrate_vector_search
          depends_on:
            - task_key: discovery
          run_job_task:
            job_id: ${resources.jobs.migrate_vector_search.id}

        - task_key: test_vector_search
          depends_on:
            - task_key: migrate_vector_search
          notebook_task:
            notebook_path: ../../tests/integration/test_vector_search.py

        - task_key: teardown_vector_search
          depends_on:
            - task_key: setup_test_config
            - task_key: seed_vector_search
            - task_key: discovery
            - task_key: migrate_vector_search
            - task_key: test_vector_search
          run_if: ALL_DONE
          notebook_task:
            notebook_path: ../../tests/integration/teardown_vector_search.py

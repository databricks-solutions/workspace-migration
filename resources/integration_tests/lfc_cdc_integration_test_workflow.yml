resources:
  jobs:
    lfc_cdc_integration_test:
      name: "${var.job_prefix}-lfc-cdc-integration-test"
      description: |
        LFC CDC (Tier-2, SQL Server + Change Tracking) integration test: seeds a
        live ingestion gateway + CDC ingestion pipeline on source, runs discovery
        + migrate_lfc, then asserts the gateway + ingestion pipeline are recreated
        on target (create-only + validate, NOT started), the gateway↔pipeline
        mapping is mirrored, and the gateway staging volume is excluded from
        volume migration.

        PREREQUISITE: Change Tracking enabled on sqldb-wsm-test + dbo.orders, and
        the UC connection 'integration_test_sqlserver' present on both workspaces.
      run_as:
        service_principal_name: ${var.migration_spn_id}
      tasks:
        - task_key: setup_test_config
          notebook_task:
            notebook_path: ../../tests/integration/setup_test_config.py
            base_parameters:
              iceberg_strategy: ""
              rls_cm_strategy: ""
              migrate_hive_dbfs_root: "false"
              hive_dbfs_target_path: ""
              catalog_filter: "integration_test_lfc_cdc"
              lfc_target_connection_name: "integration_test_sqlserver"

        - task_key: seed_lfc_cdc
          depends_on:
            - task_key: setup_test_config
          notebook_task:
            notebook_path: ../../tests/integration/seed_lfc_cdc.py

        - task_key: discovery
          depends_on:
            - task_key: seed_lfc_cdc
          notebook_task:
            notebook_path: ../../src/discovery/discovery.py

        - task_key: migrate_lfc
          depends_on:
            - task_key: discovery
          run_job_task:
            job_id: ${resources.jobs.migrate_lfc.id}

        - task_key: test_lfc_cdc
          depends_on:
            - task_key: migrate_lfc
          notebook_task:
            notebook_path: ../../tests/integration/test_lfc_cdc.py

        - task_key: teardown_lfc_cdc
          depends_on:
            - task_key: test_lfc_cdc
          notebook_task:
            notebook_path: ../../tests/integration/teardown_lfc_cdc.py

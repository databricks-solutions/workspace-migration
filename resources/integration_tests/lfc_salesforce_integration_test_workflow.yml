resources:
  jobs:
    lfc_salesforce_integration_test:
      name: "${var.job_prefix}-lfc-salesforce-integration-test"
      description: |
        LFC SaaS (Salesforce, Tier-1 row_filter) integration test: seeds a live
        Salesforce-backed LFC pipeline on source, runs discovery + migrate_lfc,
        then asserts migration_status rows show lfc_table/lfc_pipeline/lfc_view
        in their expected terminal states and that the history table and unified
        view exist on the target workspace.

        PREREQUISITE: a Salesforce UC connection named
        'integration_test_salesforce' must already exist (OAuth, admin-authorized)
        on BOTH the source and target workspaces. The seed task fails fast if not.
      run_as:
        service_principal_name: ${var.migration_spn_id}
      tasks:
        - task_key: setup_test_config
          notebook_task:
            notebook_path: ../../tests/integration/setup_test_config.py
            # SaaS LFC test: no Iceberg DDL replay, no RLS/CM staging, no Hive
            # migration. catalog_filter scopes discovery to the SF fixture catalog.
            # lfc_target_connection_name = the SF connection the recreated pipeline
            # uses on target.
            base_parameters:
              iceberg_strategy: ""
              rls_cm_strategy: ""
              migrate_hive_dbfs_root: "false"
              hive_dbfs_target_path: ""
              catalog_filter: "integration_test_lfc_sf"
              lfc_target_connection_name: "integration_test_salesforce"

        - task_key: seed_lfc_salesforce
          depends_on:
            - task_key: setup_test_config
          notebook_task:
            notebook_path: ../../tests/integration/seed_lfc_salesforce.py

        - task_key: discovery
          depends_on:
            - task_key: seed_lfc_salesforce
          notebook_task:
            notebook_path: ../../src/discovery/discovery.py

        - task_key: migrate_lfc
          depends_on:
            - task_key: discovery
          run_job_task:
            job_id: ${resources.jobs.migrate_lfc.id}

        - task_key: test_lfc_salesforce
          depends_on:
            - task_key: migrate_lfc
          notebook_task:
            notebook_path: ../../tests/integration/test_lfc_salesforce.py

        - task_key: teardown_lfc_salesforce
          depends_on:
            - task_key: test_lfc_salesforce
          notebook_task:
            notebook_path: ../../tests/integration/teardown_lfc_salesforce.py

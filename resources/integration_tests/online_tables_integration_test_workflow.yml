resources:
  jobs:
    online_tables_integration_test:
      name: "${var.job_prefix}-online-tables-integration-test"
      description: |
        Online Tables integration test: runs discovery, invokes the
        migrate_online_tables job, then asserts migration_status rows are
        in a known terminal OT state. Zero online_table rows is a pass
        (OT preview may be disabled in the test workspace).
      run_as:
        service_principal_name: ${var.migration_spn_id}
      tasks:
        - task_key: setup_test_config
          notebook_task:
            notebook_path: ../../tests/integration/setup_test_config.py
            # OT integration test: no Iceberg DDL replay, no RLS/CM staging,
            # no Hive DBFS-root migration. catalog_filter scopes discovery to
            # the OT fixture catalog so the UC/Hive fixtures seeded in
            # parallel runs are ignored.
            base_parameters:
              iceberg_strategy: ""
              rls_cm_strategy: ""
              migrate_hive_dbfs_root: "false"
              hive_dbfs_target_path: ""
              catalog_filter: "integration_test_src"

        - task_key: seed_online_tables
          depends_on:
            - task_key: setup_test_config
          notebook_task:
            notebook_path: ../../tests/integration/seed_online_tables_test_data.py

        - task_key: discovery
          depends_on:
            - task_key: seed_online_tables
          notebook_task:
            notebook_path: ../../src/discovery/discovery.py

        - task_key: migrate_online_tables
          depends_on:
            - task_key: discovery
          run_job_task:
            job_id: ${resources.jobs.migrate_online_tables.id}

        - task_key: test_online_tables
          depends_on:
            - task_key: migrate_online_tables
          notebook_task:
            notebook_path: ../../tests/integration/test_online_tables.py

        - task_key: teardown_online_tables
          depends_on:
            - task_key: setup_test_config
            - task_key: seed_online_tables
            - task_key: discovery
            - task_key: migrate_online_tables
            - task_key: test_online_tables
          run_if: ALL_DONE
          notebook_task:
            notebook_path: ../../tests/integration/teardown_online_tables.py
